{% extends 'core/base.html' %}

{% block title %}Ingresar | Linea 102{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <h1>Ingresar</h1>

        {% csrf_token %}
        {{ form.as_p }}

</section>
{% endblock %}
