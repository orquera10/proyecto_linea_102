{% extends 'core/base.html' %}

{% block title %}Registro | Linea 102{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <h1>Crear cuenta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
    </form>
    <p class="muted">Ya tenes cuenta? <a href="{% url 'login' %}">Ingresa</a>.</p>
</section>
{% endblock %}
